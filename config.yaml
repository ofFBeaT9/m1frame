# ================================================================
# m1frame — Configuration
# ================================================================
# Switch LLM backends with one line change: `backend: ollama`
# All other settings are backend-specific.

# ── LLM Backend ──────────────────────────────────────────────────
backend: claude          # claude | openai | ollama | vllm | lmstudio

claude:
  model: claude-sonnet-4-20250514
  max_tokens: 8096
  temperature: 0.2
  api_key_env: ANTHROPIC_API_KEY

openai:
  model: gpt-4o
  max_tokens: 8096
  temperature: 0.2
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1

ollama:
  model: llama3.2         # any model from `ollama pull`
  base_url: http://localhost:11434/v1
  max_tokens: 8096
  temperature: 0.2
  api_key_env: null       # not needed

vllm:
  model: meta-llama/Meta-Llama-3-8B-Instruct
  base_url: http://localhost:8000/v1
  max_tokens: 8096
  temperature: 0.2
  api_key_env: null

lmstudio:
  model: local-model      # matches model loaded in LM Studio UI
  base_url: http://localhost:1234/v1
  max_tokens: 8096
  temperature: 0.2
  api_key_env: null

# ── Pillar: BMAD ─────────────────────────────────────────────────
bmad:
  max_subtasks: 10         # max stories in one Blueprint

# ── Pillar: Miras ────────────────────────────────────────────────
miras:
  max_agents: 5
  sequential_handoff: true

# ── Pillar: Karpathy ─────────────────────────────────────────────
karpathy:
  thought_tag: thought     # wraps CoT as <thought>...</thought>
  force_cot: true
  temperature_override: 0.1

# ── Pillar: LLM Council ──────────────────────────────────────────
council:
  # Debating personas — Synthesiser is separate, not listed here
  personas:
    - name: Critic
      role: "Find logical flaws, hallucinations, missing edge cases, and unsupported claims. Be rigorous."
    - name: Advocate
      role: "Defend the strongest approach. Highlight what is working and why the output is sound."
    - name: Domain Expert
      role: "Apply deep technical knowledge. Flag domain-specific risks, best practices, and anti-patterns."
  consensus_threshold: 7   # score ≥ 7/10 → approved
  max_debate_rounds: 2

# ── Pillar: LLM Wiki ─────────────────────────────────────────────
wiki:
  directory: wiki/
  index_file: wiki/index.md
  purpose_file: purpose.md
  vector_store: file       # file | lancedb
  embed_model: null        # null = keyword search; path = local embedding model

# ── Pillar: OpenPlanter (Investigation) ──────────────────────────
openplanter:
  workspace: workspace/           # directory for investigation outputs
  provider: anthropic             # anthropic | openai | openrouter | cerebras
  auto_invoke: true               # auto-route investigator stories through OpenPlanter
  # Optional service keys (set in .env):
  #   EXA_API_KEY    — web search (exa-py)
  #   VOYAGE_API_KEY — semantic entity matching (voyageai)

# ── API Server ───────────────────────────────────────────────────
api:
  host: 0.0.0.0
  port: 8080
  # Start with: python api/server.py
  # or: uvicorn api.server:app --host 0.0.0.0 --port 8080
  # Requires: pip install fastapi uvicorn httpx

# ── Observability: Metrics ───────────────────────────────────────
metrics:
  enabled: false           # set true to auto-expose /metrics on startup
  port: 9090               # Prometheus scrape port
  # Grafana: add datasource http://localhost:9090 (Prometheus)

# ── Observability: Logging ───────────────────────────────────────
logging:
  log_dir: logs/           # JSONL files written here: m1frame_YYYY-MM-DD.jsonl
  # Tail live: tail -f logs/m1frame_$(date +%F).jsonl | jq .

# ── Webhooks ─────────────────────────────────────────────────────
webhooks:
  on_complete: null        # POST URL called when pipeline completes
  timeout_s: 10
  # Usage: python -m m1frame --goal "..." --webhook https://your-url/hook

# ── Scheduler ────────────────────────────────────────────────────
scheduler:
  enabled: false
  jobs: []
  # Example jobs (uncomment to use via scheduler):
  # - job_id: daily_vendors
  #   task: "Cross-reference vendor payments vs lobbying disclosures"
  #   interval_hours: 24
